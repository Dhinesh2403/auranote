<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>AI Agent</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item lines="none" *ngFor="let m of messages">
      <ion-label>
        <p><strong>{{ m.role === 'user' ? 'You' : 'Agent' }}</strong></p>
        <h2 style="white-space: pre-wrap;">{{ m.text }}</h2>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <ion-item lines="none">
      <ion-input
        placeholder="Message Aura Agent"
        [(ngModel)]="draft"
        (keyup.enter)="send()"
        [disabled]="isSending"
      ></ion-input>
      <ion-button slot="end" (click)="send()" [disabled]="isSending || !draft.trim()">
        <ion-icon name="send" slot="start"></ion-icon>
        {{ isSending ? 'Sending…' : 'Send' }}
      </ion-button>
    </ion-item>
  </ion-toolbar>
</ion-footer>
