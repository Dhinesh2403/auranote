<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Reminders</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createReminder()">New</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Notifications</ion-card-title>
      <ion-card-subtitle>Permission: {{ notificationPermission }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <ion-button (click)="requestPermission()" expand="block">Request permission</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list *ngIf="reminders.length; else empty">
    <ion-item *ngFor="let r of reminders">
      <ion-label>
        <h2>{{ r.title }}</h2>
        <p>{{ formatWhen(r.at) }} • {{ formatRecurrence(r.recurrence) }}</p>
        <p *ngIf="r.body">{{ r.body }}</p>
      </ion-label>
      <ion-button slot="end" fill="clear" color="danger" (click)="deleteReminder(r)">Delete</ion-button>
    </ion-item>
  </ion-list>

  <ng-template #empty>
    <div class="ion-padding">
      <h2>No reminders yet</h2>
      <p>Create a reminder and choose recurrence (once/daily/weekly/monthly).</p>
      <ion-button expand="block" (click)="createReminder()">Create reminder</ion-button>
    </div>
  </ng-template>
</ion-content>
