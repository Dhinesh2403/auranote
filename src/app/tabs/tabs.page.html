<ion-tabs>

  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon name="document-text-outline" aria-hidden="true"></ion-icon>
      <ion-label>Notes</ion-label>
      <ion-badge *ngIf="notesCount" color="primary" class="tab-badge">{{ notesCount }}</ion-badge>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon name="alarm-outline" aria-hidden="true"></ion-icon>
      <ion-label>Reminders</ion-label>
      <ion-badge *ngIf="remindersCount" color="primary" class="tab-badge">{{ remindersCount }}</ion-badge>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon name="sparkles-outline" aria-hidden="true"></ion-icon>
      <ion-label>AI Agent</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

</ion-tabs>
