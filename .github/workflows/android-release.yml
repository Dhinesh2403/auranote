name: Android Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (apk|aab|both)"
        type: choice
        required: true
        default: both
        options:
          - apk
          - aab
          - both
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build -- --configuration=production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          # Create both locations (some build configs expect different paths)
          mkdir -p android/keystore
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/keystore/release.jks
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          chmod 600 android/keystore/release.jks android/app/release.keystore

      - name: Build signed release
        working-directory: android
        shell: bash
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUILD_TYPE: ${{ inputs.build_type || 'both' }}
        run: |
          set -e

          # Debug: show current working dir, gradle and keystore presence to help diagnose missing keystore
          echo "DEBUG: PWD=$(pwd)"
          echo "DEBUG: Listing android directory"
          ls -la .. || true
          echo "DEBUG: Listing android/app"
          ls -la app || true
          echo "DEBUG: ANDROID_KEYSTORE_PATH=$ANDROID_KEYSTORE_PATH"
          if [ -f "$ANDROID_KEYSTORE_PATH" ]; then
            echo "DEBUG: Keystore file exists (verified by -f)."
            ls -la "$(dirname "$ANDROID_KEYSTORE_PATH")" || true
          else
            echo "ERROR: Keystore file not found at $ANDROID_KEYSTORE_PATH" >&2
            echo "Contents of android/app:" >&2
            ls -la app || true
            # fail early so CI logs show the problem
            exit 1
          fi

          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing signing secrets (ANDROID_KEYSTORE_PASSWORD/ANDROID_KEY_ALIAS/ANDROID_KEY_PASSWORD)" >&2
            exit 1
          fi

          # Provide signing properties to Gradle via environment variables commonly used in android/app/build.gradle setups.
          export ORG_GRADLE_PROJECT_storeFile="$ANDROID_KEYSTORE_PATH"
          export ORG_GRADLE_PROJECT_storePassword="$ANDROID_KEYSTORE_PASSWORD"
          export ORG_GRADLE_PROJECT_keyAlias="$ANDROID_KEY_ALIAS"
          export ORG_GRADLE_PROJECT_keyPassword="$ANDROID_KEY_PASSWORD"

          ./gradlew --no-daemon --version || true
          ./gradlew --no-daemon clean

          # Also pass android.injected.* properties to force Gradle to use the absolute keystore path
          SIGNING_ARGS="-Pandroid.injected.signing.store.file=$ANDROID_KEYSTORE_PATH -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD"

          echo "DEBUG: SIGNING_ARGS=$SIGNING_ARGS"

          if [ "$BUILD_TYPE" = "apk" ] || [ "$BUILD_TYPE" = "both" ]; then
            ./gradlew --no-daemon :app:assembleRelease $SIGNING_ARGS
          fi

          if [ "$BUILD_TYPE" = "aab" ] || [ "$BUILD_TYPE" = "both" ]; then
            ./gradlew --no-daemon :app:bundleRelease $SIGNING_ARGS
          fi

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
