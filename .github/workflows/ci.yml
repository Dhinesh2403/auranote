name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system deps (Chromium + Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-browser chromium
        shell: bash

      - name: Build (web)
        run: npm run build --if-present

      - name: Run tests under Xvfb
        env:
          CHROME_BIN: /usr/bin/chromium-browser
        run: |
          if [ -f ./karma.conf.js ] || grep -q "karma" package.json; then
            xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' npm test -- --watch=false || (cat /home/runner/.npm/_logs/* || true) && exit 0
          else
            echo "No Karma tests found, skipping.";
          fi
        shell: bash

      - name: Push demo branch
        if: always()
        run: |
          git config user.name "Dhinesh2403"
          git remote set-url origin https://x-access-token:${{ secrets.MY_PAT_TOKEN }}@github.com/${{ github.repository }}.git
          git fetch origin
          git checkout demo || git checkout -b demo origin/demo
          git push origin demo
        shell: bash

      - name: Upload www artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: www-artifact
          path: www
