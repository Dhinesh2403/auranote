name: CI

on:
  push:
    branches: ["main", "develop", "demo"]
  pull_request:
    branches: ["main", "develop", "demo"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Unit tests (headless)
        env:
          CHROME_BIN: chrome
          CI: true
          KARMA_BROWSER: ChromeHeadlessCI
        run: npm run test:ci

      - name: npm audit (informational)
        run: npm audit --audit-level=high || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: warn

      - name: Build (web)
        run: npm run build -- --configuration=production

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: www
          path: www
          if-no-files-found: error
