name: Deploy Web (gh-pages branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=production --base-href "/${{ github.event.repository.name }}/"
        env:
          AURA_API_KEY: ${{ secrets.AURA_API_KEY }}

      - name: Inject Environment Variables
        run: |
          mkdir -p ./www/assets
          # We create the file once with all variables from GitHub Secrets and Vars
          cat > ./www/assets/env.js <<EOF
          (function (window) {
            window.__ENV = window.__ENV || {};
            window.__ENV.AURA_ENDPOINT = '${{ vars.AURA_ENDPOINT }}';
            window.__ENV.AURA_API_KEY = '${{ vars.AURA_API_KEY }}';
          })(this);
          EOF

      - name: Configure git user
        run: |
          git config --global user.name "Dhinesh2403"
          git config --global user.email "Dhinesh2403@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          user_name: Dhinesh2403
          user_email: Dhinesh2403@users.noreply.github.com
