name: Deploy Web (gh-pages branch)

on:
  push:
    branches:
      - demo
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages)
        run: npm run build -- --configuration=production --base-href "/${{ github.event.repository.name }}/"

      - name: Inject runtime env (GEMINI_API_KEY)
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Missing GEMINI_API_KEY secret" >&2
            exit 1
          fi
          cat > www/assets/env.js <<'EOF'
          (function () {
            window.__ENV = window.__ENV || {};
            window.__ENV.GEMINI_API_KEY = "__GEMINI_API_KEY__";
          })();
          EOF
          # Replace placeholder safely
          sed -i "s/__GEMINI_API_KEY__/${GEMINI_API_KEY//\//\\/}/g" www/assets/env.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
