name: Deploy Web (gh-pages branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ vars.AURA_API_KEY }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration=production --base-href "/${{ github.event.repository.name }}/"

      - name: Inject Environment Variables
        if: always()
        run: |
          # Write runtime env file directly into the actual build output (www/assets) so it's available at runtime
          mkdir -p ./www/assets
          echo "window.__ENV = { AURA_ENDPOINT: '${{ vars.AURA_ENDPOINT }}', AURA_API_KEY: '${{ vars.AURA_API_KEY }}' };" > ./www/assets/env.js

      - name: Configure git user
        run: |
          git config --global user.name "Dhinesh2403"
          git config --global user.email "Dhinesh2403@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ vars.AURA_API_KEY }}
          publish_dir: ./www
          publish_branch: gh-pages
          user_name: Dhinesh2403
          user_email: Dhinesh2403@users.noreply.github.com
