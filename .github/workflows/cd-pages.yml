name: Deploy Web (gh-pages branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- NEW STEP: INJECT SECRETS INTO ENV.JS ---
      - name: Create env.js from Secrets
        run: |
          mkdir -p src/assets
          echo "window.__ENV = { \
            AURA_ENDPOINT: '${{ secrets.AURA_ENDPOINT }}', \
            AURA_API_KEY: '${{ secrets.AURA_API_KEY }}' \
          };" > src/assets/env.js

      - name: Build
        run: npm run build -- --configuration=production --base-href "/${{ github.event.repository.name }}/"

      - name: Configure git user
        run: |
          git config --global user.name "Dhinesh2403"
          git config --global user.email "Dhinesh2403@://github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.MY_PAT_TOKEN }}
          # UPDATED: Common Angular 17+ build path. Change if your dist folder is different.
          publish_dir: ./dist/auranote/browser 
          publish_branch: gh-pages
          force_orphan: true
          user_name: Dhinesh2403
          user_email: Dhinesh2403@://github.com
