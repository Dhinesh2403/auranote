name: Deploy Web (gh-pages branch)

on:
  push:
    branches:
      - demo
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Force-sync main into demo
        env:
          PAT: ${{ secrets.MY_PAT_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ensure we have the latest refs for main
          git fetch origin main
          # Try a regular merge first; if it fails due to conflicts, abort and retry preferring main's changes
          if git merge origin/main --no-edit; then
            git push origin demo
          else
            git merge --abort || true
            git merge -s recursive -X theirs origin/main --no-edit
            git push origin demo
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages)
        run: npm run build -- --configuration=production --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
