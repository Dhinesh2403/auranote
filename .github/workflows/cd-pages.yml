name: CD - Deploy Web (gh-pages branch)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"
        env:
          SERVER_HOST: ${{ vars.SERVER_HOST }}

      - name: Inject & Disguise Secret
        run: |
          mkdir -p ./www/assets
          cat > ./www/assets/env.js <<EOF
          (function (window) {
            window.__ENV = window.__ENV || {};
            window.__ENV.SERVER_HOST = '${{ vars.SERVER_HOST }}';
          })(this);
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages