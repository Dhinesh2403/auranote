name: Android Debug (Testing)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (debug-apk|debug-aab)"
        type: choice
        required: true
        default: debug-apk
        options:
          - debug-apk
          - debug-aab

permissions:
  contents: write

jobs:
  android-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history for git operations 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build -- --configuration=production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Clear org.gradle.java.home override
        working-directory: android
        run: |
          sed -i '/^org.gradle.java.home/d' gradle.properties || true

      - name: Build debug
        working-directory: android
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
        run: |
          set -e
          ./gradlew --no-daemon clean

          if [ "$BUILD_TYPE" = "debug-apk" ]; then
            ./gradlew --no-daemon :app:assembleDebug
          elif [ "$BUILD_TYPE" = "debug-aab" ]; then
            ./gradlew --no-daemon :app:bundleDebug
          fi

      - name: Copy APK to apk folder
        shell: bash
        run: |
          mkdir -p apk
          if [ "${{ inputs.build_type }}" = "debug-apk" ]; then
            cp android/app/build/outputs/apk/debug/*.apk apk/app-debug.apk
          elif [ "${{ inputs.build_type }}" = "debug-aab" ]; then
            cp android/app/build/outputs/bundle/debug/*.aab apk/app-debug.aab
          fi

      - name: Commit and push APK
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add apk/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add debug APK/AAB from CI build"
            # Ensure push uses the workflow token and push to the branch that triggered the workflow
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          fi