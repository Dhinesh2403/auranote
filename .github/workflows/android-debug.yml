name: Android Release (Signed)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (release-apk|release-aab)"
        type: choice
        required: true
        default: release-apk
        options:
          - release-apk
          - release-aab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch full history for git operations 1
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build -- --configuration=production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Clear org.gradle.java.home override
        working-directory: android
        run: |
          sed -i '/^org.gradle.java.home/d' gradle.properties || true

      - name: Decode Keystore for Build
        run: |
          # Create the nested app/app folder structure the error is looking for
          mkdir -p android/app/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/app/release.keystore

      - name: Build release
        working-directory: android
        shell: bash
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -e
          ./gradlew --no-daemon clean

          SIGNING_ARGS="-Pandroid.injected.signing.store.file=app/release.keystore -Pandroid.injected.signing.store.password=${KEYSTORE_PASSWORD} -Pandroid.injected.signing.key.alias=${KEY_ALIAS} -Pandroid.injected.signing.key.password=${KEY_PASSWORD}"

          if [ "$BUILD_TYPE" = "release-apk" ]; then
            ./gradlew --no-daemon :app:assembleRelease $SIGNING_ARGS
          elif [ "$BUILD_TYPE" = "release-aab" ]; then
            ./gradlew --no-daemon :app:bundleRelease $SIGNING_ARGS
          fi

      - name: Wipe keystore from runner
        working-directory: android
        if: always()
        run: |
          shred -u app/release.keystore || rm -f app/release.keystore || true

      - name: Copy release artifact to apk folder
        shell: bash
        run: |
          mkdir -p apk
          if [ "${{ inputs.build_type }}" = "release-apk" ]; then
            cp android/app/build/outputs/apk/release/*.apk apk/app-release.apk || true
          elif [ "${{ inputs.build_type }}" = "release-aab" ]; then
            cp android/app/build/outputs/bundle/release/*.aab apk/app-release.aab || true
          fi

      - name: Commit and push APK
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add apk/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add release APK/AAB from CI build"
            # Ensure push uses the workflow token and push to the branch that triggered the workflow
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git push origin HEAD:refs/heads/${{ github.ref_name }}
          fi